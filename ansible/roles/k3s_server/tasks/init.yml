---
- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Download k3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: '0755'
  when: not k3s_binary.stat.exists

- name: Install k3s with cluster-init (embedded etcd)
  ansible.builtin.command:
    cmd: /tmp/k3s-install.sh server --cluster-init
    creates: /usr/local/bin/k3s
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_server_version }}"
  when: not k3s_binary.stat.exists
  notify: Restart k3s

- name: Wait for k3s systemd service file to exist
  ansible.builtin.wait_for:
    path: /etc/systemd/system/k3s.service
    state: present
    timeout: 120

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Ensure k3s service is enabled and running
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started

- name: Wait for node token to be generated
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    state: present
    timeout: 60

- name: Read node token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: node_token_raw
  no_log: true

- name: Share node token with joining server nodes
  ansible.builtin.set_fact:
    k3s_node_token: "{{ node_token_raw.content | b64decode | trim }}"
  delegate_to: "{{ item }}"
  delegate_facts: true
  loop: "{{ groups['k3s_servers'] }}"
  no_log: true
